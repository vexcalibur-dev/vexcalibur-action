name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  ACTIONLINT_VERSION: "1.7.12"
  VEXCALIBUR_SOURCE_REF: main
  VEXCALIBUR_CONTRACT_ARTIFACT: vexcalibur-contract-fixtures
  VEXCALIBUR_CSAF_RELEASE_ARTIFACT: csaf-released-package-output
  VEXCALIBUR_CSAF_WHEEL_ARTIFACT: csaf-wheel-output
  VEXCALIBUR_OPENVEX_RELEASE_ARTIFACT: openvex-released-package-output
  VEXCALIBUR_OPENVEX_WHEEL_ARTIFACT: openvex-wheel-output
  VEXCALIBUR_RELEASE_ACTION_REF: v0.2.1
  VEXCALIBUR_RELEASE_PACKAGE_VERSION: "0.3.0"
  VEXCALIBUR_WHEEL_ARTIFACT: vexcalibur-wheel
  VEXCALIBUR_SBOM_TO_VEX_ARTIFACT: vexcalibur-sbom-to-vex-output

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"

      - name: Install development dependencies
        run: >-
          python -m pip install
          --only-binary=:all:
          --require-hashes
          -r requirements-dev.txt

      - name: Install actionlint
        run: |
          go install "github.com/rhysd/actionlint/cmd/actionlint@v${ACTIONLINT_VERSION}"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Validate shell
        run: |
          bash -n scripts/*.sh
          shellcheck scripts/*.sh

      - name: Validate GitHub Actions
        run: actionlint

      - name: Validate YAML and JSON
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import yaml

          for path in sorted(Path(".").glob("**/*.yml")):
              with path.open() as stream:
                  yaml.safe_load(stream)
              print(f"YAML OK {path}")

          for path in sorted(Path(".").glob("**/*.yaml")):
              with path.open() as stream:
                  yaml.safe_load(stream)
              print(f"YAML OK {path}")

          for path in sorted(Path(".").glob("**/*.json")):
              with path.open() as stream:
                  json.load(stream)
              print(f"JSON OK {path}")
          PY

      - name: Scan pull request for secrets
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if gh api "/repos/${GITHUB_REPOSITORY}/contents/.secrets.baseline?ref=${BASE_SHA}" --jq .content \
            | base64 --decode > /tmp/base.secrets.baseline; then
            echo "Using .secrets.baseline from pull request base."
            git ls-files -z | xargs -0 detect-secrets-hook --baseline /tmp/base.secrets.baseline --
          else
            echo "Base branch does not have .secrets.baseline yet; scanning without a baseline."
            git ls-files -z | xargs -0 detect-secrets-hook --
          fi

      - name: Scan pushed code for secrets
        if: github.event_name != 'pull_request'
        run: git ls-files -z | xargs -0 detect-secrets-hook --baseline .secrets.baseline --

      - name: Run unit tests
        run: python -m unittest discover -s tests

  wrapper-fuzz-smoke:
    name: Wrapper fuzz smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"

      - name: Install development dependencies
        run: >-
          python -m pip install
          --only-binary=:all:
          --require-hashes
          -r requirements-dev.txt

      - name: Run deterministic wrapper properties
        run: python -m unittest tests.fuzz.wrapper_properties

  build-vexcalibur-wheel:
    name: Build Vexcalibur wheel
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - name: Checkout Vexcalibur
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: vexcalibur-dev/vexcalibur
          ref: ${{ env.VEXCALIBUR_SOURCE_REF }}
          path: vexcalibur-source
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"

      - name: Build wheel
        run: python -m pip wheel --no-deps --wheel-dir "$RUNNER_TEMP/vexcalibur-dist" ./vexcalibur-source

      - name: Validate built wheel
        run: |
          set -euo pipefail
          wheel_count="$(find "$RUNNER_TEMP/vexcalibur-dist" -maxdepth 1 -name 'vexcalibur-*.whl' | wc -l)"
          if [[ "$wheel_count" -ne 1 ]]; then
            echo "expected exactly one vexcalibur wheel, found $wheel_count" >&2
            find "$RUNNER_TEMP/vexcalibur-dist" -maxdepth 1 -type f >&2
            exit 1
          fi
          find "$RUNNER_TEMP/vexcalibur-dist" -maxdepth 1 -name 'vexcalibur-*.whl' -print

      - name: Upload wheel
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.VEXCALIBUR_WHEEL_ARTIFACT }}
          path: ${{ runner.temp }}/vexcalibur-dist/vexcalibur-*.whl
          if-no-files-found: error

      - name: Upload contract fixtures
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.VEXCALIBUR_CONTRACT_ARTIFACT }}
          path: |
            vexcalibur-source/tests/golden/csaf-vex-all-analysis-states.json
            vexcalibur-source/tests/golden/cyclonedx-vex-all-analysis-states.json
            vexcalibur-source/tests/golden/openvex-vex-all-analysis-states.json
          if-no-files-found: error

  e2e-wheel-help:
    name: Action E2E help (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: [quality, build-vexcalibur-wheel]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Resolve Vexcalibur wheel
        id: wheel
        uses: ./.github/actions/resolve-vexcalibur-wheel
        with:
          artifact-name: ${{ env.VEXCALIBUR_WHEEL_ARTIFACT }}

      - name: Run local action help
        uses: ./
        with:
          package-spec: ${{ steps.wheel.outputs.wheel-path }}
          allow-development-package-spec: "true"
          python-version: ${{ matrix.python-version }}
          args: --help

  e2e-wheel-query-osv:
    name: Action E2E query-osv (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: [quality, build-vexcalibur-wheel]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Resolve Vexcalibur wheel
        id: wheel
        uses: ./.github/actions/resolve-vexcalibur-wheel
        with:
          artifact-name: ${{ env.VEXCALIBUR_WHEEL_ARTIFACT }}

      - name: Run local action query-osv
        uses: ./.github/actions/query-osv-e2e
        with:
          package-spec: ${{ steps.wheel.outputs.wheel-path }}
          allow-development-package-spec: "true"
          python-version: ${{ matrix.python-version }}

  sbom-to-vex-e2e:
    name: SBOM-to-VEX action E2E
    runs-on: ubuntu-latest
    needs: [quality, build-vexcalibur-wheel]
    steps:
      - name: Checkout action
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Resolve Vexcalibur wheel
        id: wheel
        uses: ./.github/actions/resolve-vexcalibur-wheel
        with:
          artifact-name: ${{ env.VEXCALIBUR_WHEEL_ARTIFACT }}

      - name: Download Vexcalibur contract fixtures
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.VEXCALIBUR_CONTRACT_ARTIFACT }}
          path: ${{ runner.temp }}/vexcalibur-contract

      - name: Prepare output directory
        run: mkdir -p "$RUNNER_TEMP/vexcalibur-action-artifacts"

      - name: Generate VEX from XML SBOM
        uses: ./
        with:
          package-spec: ${{ steps.wheel.outputs.wheel-path }}
          allow-development-package-spec: "true"
          args: |
            generate
            ${{ github.workspace }}/tests/fixtures/sbom/cyclonedx-xml-1.5-simple.xml
            --offline
            --findings-file
            ${{ github.workspace }}/tests/fixtures/findings/all-analysis-states.json
            --timestamp
            2026-06-23T00:00:00Z
            --output
            ${{ runner.temp }}/vexcalibur-action-artifacts/cyclonedx-vex.xml-input.json

      - name: Validate generated artifact
        run: |
          python - <<'PY'
          from pathlib import Path
          import difflib
          import json
          import os

          artifact = Path(os.environ["RUNNER_TEMP"]) / "vexcalibur-action-artifacts" / "cyclonedx-vex.xml-input.json"
          payload = json.loads(artifact.read_text(encoding="utf-8"))
          expected_path = Path(os.environ["RUNNER_TEMP"]) / "vexcalibur-contract" / "cyclonedx-vex-all-analysis-states.json"
          expected = json.loads(expected_path.read_text(encoding="utf-8"))
          if payload != expected:
              actual_text = json.dumps(payload, indent=2, sort_keys=True).splitlines()
              expected_text = json.dumps(expected, indent=2, sort_keys=True).splitlines()
              diff = "\n".join(
                  difflib.unified_diff(
                      expected_text,
                      actual_text,
                      fromfile=str(expected_path),
                      tofile=str(artifact),
                      lineterm="",
                  )
              )
              raise SystemExit(f"Generated VEX did not match the golden fixture:\n{diff}")
          PY

      - name: Upload generated VEX
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.VEXCALIBUR_SBOM_TO_VEX_ARTIFACT }}
          path: ${{ runner.temp }}/vexcalibur-action-artifacts/*.json
          if-no-files-found: warn

  openvex-wheel-e2e:
    name: OpenVEX action E2E (development wheel)
    runs-on: ubuntu-latest
    needs: [quality, build-vexcalibur-wheel]
    steps:
      - name: Checkout action
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Resolve Vexcalibur wheel
        id: wheel
        uses: ./.github/actions/resolve-vexcalibur-wheel
        with:
          artifact-name: ${{ env.VEXCALIBUR_WHEEL_ARTIFACT }}

      - name: Download Vexcalibur contract fixtures
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.VEXCALIBUR_CONTRACT_ARTIFACT }}
          path: ${{ runner.temp }}/vexcalibur-contract

      - name: Generate and validate OpenVEX
        uses: ./.github/actions/openvex-e2e
        with:
          package-spec: ${{ steps.wheel.outputs.wheel-path }}
          allow-development-package-spec: "true"
          expected-path: ${{ runner.temp }}/vexcalibur-contract/openvex-vex-all-analysis-states.json
          artifact-name: ${{ env.VEXCALIBUR_OPENVEX_WHEEL_ARTIFACT }}

  csaf-wheel-e2e:
    name: CSAF action E2E (development wheel)
    runs-on: ubuntu-latest
    needs: [quality, build-vexcalibur-wheel]
    steps:
      - name: Checkout action
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Resolve Vexcalibur wheel
        id: wheel
        uses: ./.github/actions/resolve-vexcalibur-wheel
        with:
          artifact-name: ${{ env.VEXCALIBUR_WHEEL_ARTIFACT }}

      - name: Download Vexcalibur contract fixtures
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.VEXCALIBUR_CONTRACT_ARTIFACT }}
          path: ${{ runner.temp }}/vexcalibur-contract

      - name: Generate and validate CSAF
        uses: ./.github/actions/csaf-e2e
        with:
          package-spec: ${{ steps.wheel.outputs.wheel-path }}
          allow-development-package-spec: "true"
          expected-path: ${{ runner.temp }}/vexcalibur-contract/csaf-vex-all-analysis-states.json
          artifact-name: ${{ env.VEXCALIBUR_CSAF_WHEEL_ARTIFACT }}

  resolve-released-package:
    name: Resolve released package
    runs-on: ubuntu-latest
    needs: [quality]
    outputs:
      has-release: ${{ steps.release.outputs.has_release }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"

      - name: Find latest released package
        id: release
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          from urllib.error import HTTPError
          from urllib.request import urlopen
          import json
          import os

          expected_version = os.environ["VEXCALIBUR_RELEASE_PACKAGE_VERSION"].strip()

          try:
              with urlopen("https://pypi.org/pypi/vexcalibur/json", timeout=30) as response:
                  payload = json.load(response)
          except HTTPError as exc:
              if exc.code == 404:
                  if expected_version:
                      raise SystemExit(
                          "VEXCALIBUR_RELEASE_PACKAGE_VERSION is set, but PyPI has no vexcalibur project"
                      )
                  print("has_release=false")
                  raise SystemExit(0)
              raise

          version = payload["info"]["version"]
          if not expected_version:
              raise SystemExit(
                  "PyPI has a vexcalibur release, but VEXCALIBUR_RELEASE_PACKAGE_VERSION is empty"
              )
          if version != expected_version:
              raise SystemExit(
                  "latest PyPI vexcalibur release does not match "
                  f"VEXCALIBUR_RELEASE_PACKAGE_VERSION ({version} != {expected_version})"
              )
          print("has_release=true")
          print(f"version={version}")
          PY

      - name: Report missing release
        if: steps.release.outputs.has_release != 'true'
        run: echo "No Vexcalibur PyPI release exists yet; skipping released-package E2E."

  released-package-help:
    name: Released package E2E help (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: [quality, resolve-released-package]
    if: needs.resolve-released-package.outputs.has-release == 'true'
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run latest released package help
        uses: ./
        with:
          package-spec: vexcalibur==${{ needs.resolve-released-package.outputs.version }}
          python-version: ${{ matrix.python-version }}
          args: --help

  released-package-query-osv:
    name: Released package E2E query-osv (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: [quality, resolve-released-package]
    if: needs.resolve-released-package.outputs.has-release == 'true'
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run latest released package query-osv
        uses: ./.github/actions/query-osv-e2e
        with:
          package-spec: vexcalibur==${{ needs.resolve-released-package.outputs.version }}
          python-version: ${{ matrix.python-version }}

  released-package-openvex:
    name: Released package E2E OpenVEX
    runs-on: ubuntu-latest
    needs: [quality, resolve-released-package]
    if: needs.resolve-released-package.outputs.has-release == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Checkout released action
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: vexcalibur-dev/vexcalibur-action
          ref: ${{ env.VEXCALIBUR_RELEASE_ACTION_REF }}
          path: released-action
          persist-credentials: false

      - name: Verify released action contract
        run: |
          normalize_action_contract() {
            awk '
              /^inputs:/ { section = "inputs"; print; next }
              /^runs:/ { section = "runs"; print; next }
              section == "inputs" && /^    description:/ { in_description = 1; next }
              section == "inputs" && in_description && /^      / { next }
              section == "inputs" { in_description = 0; print; next }
              section == "runs" { print }
            ' "$1"
          }

          normalize_action_contract action.yml > "$RUNNER_TEMP/current-action-contract.yml"
          normalize_action_contract released-action/action.yml > "$RUNNER_TEMP/released-action-contract.yml"
          cmp "$RUNNER_TEMP/current-action-contract.yml" "$RUNNER_TEMP/released-action-contract.yml"
          cmp scripts/run-vexcalibur.sh released-action/scripts/run-vexcalibur.sh

      - name: Generate and validate OpenVEX
        uses: ./.github/actions/openvex-e2e
        with:
          package-spec: vexcalibur==${{ needs.resolve-released-package.outputs.version }}
          artifact-name: ${{ env.VEXCALIBUR_OPENVEX_RELEASE_ARTIFACT }}

  released-package-csaf:
    name: Released package E2E CSAF
    runs-on: ubuntu-latest
    needs: [quality, resolve-released-package]
    if: needs.resolve-released-package.outputs.has-release == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Generate and validate CSAF
        uses: ./.github/actions/csaf-e2e
        with:
          package-spec: vexcalibur==${{ needs.resolve-released-package.outputs.version }}
          expected-generator-version: ${{ needs.resolve-released-package.outputs.version }}
          artifact-name: ${{ env.VEXCALIBUR_CSAF_RELEASE_ARTIFACT }}

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          comment-summary-in-pr: never
          fail-on-severity: high

  scorecard:
    name: OpenSSF Scorecard
    runs-on: ubuntu-latest
    permissions:
      actions: read
      checks: read
      contents: read
      issues: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        uses: ./.github/actions/run-scorecard

  ci:
    name: CI result
    runs-on: ubuntu-latest
    needs:
      - quality
      - wrapper-fuzz-smoke
      - build-vexcalibur-wheel
      - e2e-wheel-help
      - e2e-wheel-query-osv
      - sbom-to-vex-e2e
      - openvex-wheel-e2e
      - csaf-wheel-e2e
      - resolve-released-package
      - released-package-help
      - released-package-query-osv
      - released-package-openvex
      - released-package-csaf
      - dependency-review
      - scorecard
    if: always()
    steps:
      - name: Check required jobs
        run: |
          check_required_job() {
            local name="$1"
            local result="$2"
            if [[ "$result" != "success" ]]; then
              echo "Required job failed or was skipped: $name ($result)" >&2
              exit 1
            fi
          }

          check_release_job() {
            local name="$1"
            local result="$2"
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "Released-package job failed: $name ($result)" >&2
              exit 1
            fi
          }

          check_released_package_job() {
            local name="$1"
            local result="$2"
            if [[ "${{ needs.resolve-released-package.outputs.has-release }}" == "true" ]]; then
              check_required_job "$name" "$result"
            else
              check_release_job "$name" "$result"
            fi
          }

          check_required_job "Quality" "${{ needs.quality.result }}"
          check_required_job "Wrapper fuzz smoke" "${{ needs.wrapper-fuzz-smoke.result }}"
          check_required_job "Build Vexcalibur wheel" "${{ needs.build-vexcalibur-wheel.result }}"
          check_required_job "Action E2E help" "${{ needs.e2e-wheel-help.result }}"
          check_required_job "Action E2E query-osv" "${{ needs.e2e-wheel-query-osv.result }}"
          check_required_job "SBOM-to-VEX action E2E" "${{ needs.sbom-to-vex-e2e.result }}"
          check_required_job "OpenVEX action E2E (development wheel)" "${{ needs.openvex-wheel-e2e.result }}"
          check_required_job "CSAF action E2E (development wheel)" "${{ needs.csaf-wheel-e2e.result }}"
          check_required_job "Resolve released package" "${{ needs.resolve-released-package.result }}"
          check_required_job "OpenSSF Scorecard" "${{ needs.scorecard.result }}"

          check_released_package_job "Released package E2E help" "${{ needs.released-package-help.result }}"
          check_released_package_job "Released package E2E query-osv" "${{ needs.released-package-query-osv.result }}"
          check_released_package_job "Released package E2E OpenVEX" "${{ needs.released-package-openvex.result }}"
          check_released_package_job "Released package E2E CSAF" "${{ needs.released-package-csaf.result }}"

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            check_required_job "Dependency Review" "${{ needs.dependency-review.result }}"
          else
            check_release_job "Dependency Review" "${{ needs.dependency-review.result }}"
          fi

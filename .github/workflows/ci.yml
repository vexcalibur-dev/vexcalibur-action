name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  VEXCALIBUR_SOURCE_REF: main
  VEXCALIBUR_CONTRACT_ARTIFACT: vexcalibur-contract-fixtures
  VEXCALIBUR_CSAF_RELEASE_ARTIFACT: csaf-released-package-output
  VEXCALIBUR_CSAF_WHEEL_ARTIFACT: csaf-wheel-output
  VEXCALIBUR_OPENVEX_RELEASE_ARTIFACT: openvex-released-package-output
  VEXCALIBUR_OPENVEX_WHEEL_ARTIFACT: openvex-wheel-output
  VEXCALIBUR_RELEASE_PACKAGE_ARTIFACT: vexcalibur-release-package
  VEXCALIBUR_WHEEL_ARTIFACT: vexcalibur-wheel
  VEXCALIBUR_SBOM_TO_VEX_ARTIFACT: vexcalibur-sbom-to-vex-output

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install workflow tools
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: "v2026.7.11"
          install_args: "actionlint shellcheck"
          cache: true

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14.5"

      - name: Install development dependencies
        run: >-
          python -m pip install
          --only-binary=:all:
          --require-hashes
          -r requirements-dev.txt

      - name: Validate shell
        run: |
          bash -n scripts/*.sh
          shellcheck scripts/*.sh

      - name: Validate Python quality
        run: |
          ruff format --check scripts tests
          ruff check scripts tests

      - name: Validate GitHub Actions
        run: actionlint

      - name: Validate YAML and JSON
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import yaml

          for path in sorted(Path(".").glob("**/*.yml")):
              with path.open() as stream:
                  yaml.safe_load(stream)
              print(f"YAML OK {path}")

          for path in sorted(Path(".").glob("**/*.yaml")):
              with path.open() as stream:
                  yaml.safe_load(stream)
              print(f"YAML OK {path}")

          for path in sorted(Path(".").glob("**/*.json")):
              with path.open() as stream:
                  json.load(stream)
              print(f"JSON OK {path}")
          PY

      - name: Verify public Action contract compatibility
        run: scripts/check-action-contract.py

      - name: Scan pull request for secrets
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if gh api "/repos/${GITHUB_REPOSITORY}/contents/.secrets.baseline?ref=${BASE_SHA}" --jq .content \
            | base64 --decode > /tmp/base.secrets.baseline; then
            echo "Using .secrets.baseline from pull request base."
            git ls-files -z | xargs -0 detect-secrets-hook --baseline /tmp/base.secrets.baseline --
          else
            echo "Base branch does not have .secrets.baseline yet; scanning without a baseline."
            git ls-files -z | xargs -0 detect-secrets-hook --
          fi

      - name: Scan pushed code for secrets
        if: github.event_name != 'pull_request'
        run: git ls-files -z | xargs -0 detect-secrets-hook --baseline .secrets.baseline --

      - name: Run unit tests
        run: python -m unittest discover -s tests

  wrapper-fuzz-smoke:
    name: Wrapper fuzz smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14.5"

      - name: Install development dependencies
        run: >-
          python -m pip install
          --only-binary=:all:
          --require-hashes
          -r requirements-dev.txt

      - name: Run deterministic wrapper properties
        run: python -m unittest tests.fuzz.wrapper_properties

  build-vexcalibur-wheel:
    name: Build Vexcalibur wheel
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - name: Checkout Vexcalibur
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: vexcalibur-dev/vexcalibur
          ref: ${{ env.VEXCALIBUR_SOURCE_REF }}
          path: vexcalibur-source
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14.5"

      - name: Build wheel
        run: python -m pip wheel --no-deps --wheel-dir "$RUNNER_TEMP/vexcalibur-dist" ./vexcalibur-source

      - name: Validate built wheel
        run: |
          set -euo pipefail
          wheel_count="$(find "$RUNNER_TEMP/vexcalibur-dist" -maxdepth 1 -name 'vexcalibur-*.whl' | wc -l)"
          if [[ "$wheel_count" -ne 1 ]]; then
            echo "expected exactly one vexcalibur wheel, found $wheel_count" >&2
            find "$RUNNER_TEMP/vexcalibur-dist" -maxdepth 1 -type f >&2
            exit 1
          fi
          find "$RUNNER_TEMP/vexcalibur-dist" -maxdepth 1 -name 'vexcalibur-*.whl' -print

      - name: Upload wheel
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.VEXCALIBUR_WHEEL_ARTIFACT }}
          path: ${{ runner.temp }}/vexcalibur-dist/vexcalibur-*.whl
          if-no-files-found: error

      - name: Upload contract fixtures
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.VEXCALIBUR_CONTRACT_ARTIFACT }}
          path: |
            vexcalibur-source/tests/golden/csaf-vex-all-analysis-states.json
            vexcalibur-source/tests/golden/cyclonedx-vex-all-analysis-states.json
            vexcalibur-source/tests/golden/openvex-vex-all-analysis-states.json
          if-no-files-found: error

  e2e-wheel-help:
    name: Action E2E help (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: [quality, build-vexcalibur-wheel]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Resolve Vexcalibur wheel
        id: wheel
        uses: ./.github/actions/resolve-vexcalibur-wheel
        with:
          artifact-name: ${{ env.VEXCALIBUR_WHEEL_ARTIFACT }}

      - name: Run local action help
        uses: ./
        with:
          package-spec: ${{ steps.wheel.outputs.wheel-path }}
          allow-development-package-spec: "true"
          python-version: ${{ matrix.python-version }}
          args: --help

  e2e-wheel-query-osv:
    name: Action E2E query-osv (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: [quality, build-vexcalibur-wheel]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Resolve Vexcalibur wheel
        id: wheel
        uses: ./.github/actions/resolve-vexcalibur-wheel
        with:
          artifact-name: ${{ env.VEXCALIBUR_WHEEL_ARTIFACT }}

      - name: Run local action query-osv
        uses: ./.github/actions/query-osv-e2e
        with:
          package-spec: ${{ steps.wheel.outputs.wheel-path }}
          allow-development-package-spec: "true"
          python-version: ${{ matrix.python-version }}

  sbom-to-vex-e2e:
    name: SBOM-to-VEX action E2E
    runs-on: ubuntu-latest
    needs: [quality, build-vexcalibur-wheel]
    steps:
      - name: Checkout action
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Resolve Vexcalibur wheel
        id: wheel
        uses: ./.github/actions/resolve-vexcalibur-wheel
        with:
          artifact-name: ${{ env.VEXCALIBUR_WHEEL_ARTIFACT }}

      - name: Download Vexcalibur contract fixtures
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.VEXCALIBUR_CONTRACT_ARTIFACT }}
          path: ${{ runner.temp }}/vexcalibur-contract

      - name: Prepare output directory
        run: mkdir -p "$RUNNER_TEMP/vexcalibur-action-artifacts"

      - name: Generate VEX from XML SBOM
        uses: ./
        with:
          package-spec: ${{ steps.wheel.outputs.wheel-path }}
          allow-development-package-spec: "true"
          args: |
            generate
            ${{ github.workspace }}/tests/fixtures/sbom/cyclonedx-xml-1.5-simple.xml
            --offline
            --findings-file
            ${{ github.workspace }}/tests/fixtures/findings/all-analysis-states.json
            --timestamp
            2026-06-23T00:00:00Z
            --output
            ${{ runner.temp }}/vexcalibur-action-artifacts/cyclonedx-vex.xml-input.json

      - name: Validate generated artifact
        run: |
          python - <<'PY'
          from pathlib import Path
          import difflib
          import json
          import os

          artifact = Path(os.environ["RUNNER_TEMP"]) / "vexcalibur-action-artifacts" / "cyclonedx-vex.xml-input.json"
          payload = json.loads(artifact.read_text(encoding="utf-8"))
          expected_path = Path(os.environ["RUNNER_TEMP"]) / "vexcalibur-contract" / "cyclonedx-vex-all-analysis-states.json"
          expected = json.loads(expected_path.read_text(encoding="utf-8"))
          if payload != expected:
              actual_text = json.dumps(payload, indent=2, sort_keys=True).splitlines()
              expected_text = json.dumps(expected, indent=2, sort_keys=True).splitlines()
              diff = "\n".join(
                  difflib.unified_diff(
                      expected_text,
                      actual_text,
                      fromfile=str(expected_path),
                      tofile=str(artifact),
                      lineterm="",
                  )
              )
              raise SystemExit(f"Generated VEX did not match the golden fixture:\n{diff}")
          PY

      - name: Upload generated VEX
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.VEXCALIBUR_SBOM_TO_VEX_ARTIFACT }}
          path: ${{ runner.temp }}/vexcalibur-action-artifacts/*.json
          if-no-files-found: warn

  openvex-wheel-e2e:
    name: OpenVEX action E2E (development wheel)
    runs-on: ubuntu-latest
    needs: [quality, build-vexcalibur-wheel]
    steps:
      - name: Checkout action
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Resolve Vexcalibur wheel
        id: wheel
        uses: ./.github/actions/resolve-vexcalibur-wheel
        with:
          artifact-name: ${{ env.VEXCALIBUR_WHEEL_ARTIFACT }}

      - name: Download Vexcalibur contract fixtures
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.VEXCALIBUR_CONTRACT_ARTIFACT }}
          path: ${{ runner.temp }}/vexcalibur-contract

      - name: Generate and validate OpenVEX
        uses: ./.github/actions/openvex-e2e
        with:
          package-spec: ${{ steps.wheel.outputs.wheel-path }}
          allow-development-package-spec: "true"
          expected-path: ${{ runner.temp }}/vexcalibur-contract/openvex-vex-all-analysis-states.json
          artifact-name: ${{ env.VEXCALIBUR_OPENVEX_WHEEL_ARTIFACT }}

  csaf-wheel-e2e:
    name: CSAF action E2E (development wheel)
    runs-on: ubuntu-latest
    needs: [quality, build-vexcalibur-wheel]
    steps:
      - name: Checkout action
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Resolve Vexcalibur wheel
        id: wheel
        uses: ./.github/actions/resolve-vexcalibur-wheel
        with:
          artifact-name: ${{ env.VEXCALIBUR_WHEEL_ARTIFACT }}

      - name: Download Vexcalibur contract fixtures
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.VEXCALIBUR_CONTRACT_ARTIFACT }}
          path: ${{ runner.temp }}/vexcalibur-contract

      - name: Generate and validate CSAF
        uses: ./.github/actions/csaf-e2e
        with:
          package-spec: ${{ steps.wheel.outputs.wheel-path }}
          allow-development-package-spec: "true"
          expected-path: ${{ runner.temp }}/vexcalibur-contract/csaf-vex-all-analysis-states.json
          artifact-name: ${{ env.VEXCALIBUR_CSAF_WHEEL_ARTIFACT }}

  resolve-released-package:
    name: Resolve tested package
    runs-on: ubuntu-latest
    needs: [quality]
    outputs:
      package-spec: ${{ steps.compatibility.outputs.package_spec }}
      python-versions: ${{ steps.compatibility.outputs.python_versions }}
      version: ${{ steps.compatibility.outputs.package_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Read compatibility declaration
        id: compatibility
        run: >-
          scripts/release.py manifest --ref "${GITHUB_SHA}"
          >> "${GITHUB_OUTPUT}"

  verify-released-package-artifact:
    name: Verify released package artifact (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: [quality, resolve-released-package]
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(needs.resolve-released-package.outputs.python-versions) }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Resolve declared package artifact
        id: artifact
        env:
          PACKAGE_SPEC: ${{ needs.resolve-released-package.outputs.package-spec }}
          PACKAGE_VERSION: ${{ needs.resolve-released-package.outputs.version }}
          PIP_CONFIG_FILE: /dev/null
        run: |
          set -euo pipefail

          pip_report="${RUNNER_TEMP}/vexcalibur-pip-report.json"
          pypi_release="${RUNNER_TEMP}/vexcalibur-pypi-release.json"
          python -I -m pip \
            --isolated \
            --no-cache-dir \
            install \
            --disable-pip-version-check \
            --dry-run \
            --ignore-installed \
            --no-input \
            --no-deps \
            --only-binary=:all: \
            --report "${pip_report}" \
            -- "${PACKAGE_SPEC}"
          curl \
            --fail \
            --location \
            --max-time 30 \
            --proto '=https' \
            --show-error \
            --silent \
            --output "${pypi_release}" \
            "https://pypi.org/pypi/vexcalibur/${PACKAGE_VERSION}/json"
          scripts/release.py verify-package-artifact \
            --pip-report "${pip_report}" \
            --pypi-release "${pypi_release}" \
            --package-spec "${PACKAGE_SPEC}" >> "${GITHUB_OUTPUT}"

      - name: Download verified package artifact
        env:
          ARTIFACT_FILENAME: ${{ steps.artifact.outputs.artifact_filename }}
          ARTIFACT_SHA256: ${{ steps.artifact.outputs.artifact_sha256 }}
          ARTIFACT_URL: ${{ steps.artifact.outputs.artifact_url }}
        run: |
          set -euo pipefail

          artifact_dir="${RUNNER_TEMP}/vexcalibur-release-package"
          artifact_path="${artifact_dir}/${ARTIFACT_FILENAME}"
          mkdir -p "${artifact_dir}"
          curl \
            --fail \
            --location \
            --max-time 60 \
            --proto '=https' \
            --proto-redir '=https' \
            --show-error \
            --silent \
            --output "${artifact_path}" \
            "${ARTIFACT_URL}"
          printf '%s  %s\n' "${ARTIFACT_SHA256}" "${artifact_path}" \
            | sha256sum --check --strict -

      - name: Upload verified package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.VEXCALIBUR_RELEASE_PACKAGE_ARTIFACT }}-python-${{ matrix.python-version }}
          path: ${{ runner.temp }}/vexcalibur-release-package/*.whl
          if-no-files-found: error
          overwrite: true
          retention-days: 1

  released-package-help:
    name: Released package E2E help (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: [quality, resolve-released-package, verify-released-package-artifact]
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(needs.resolve-released-package.outputs.python-versions) }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Resolve verified Vexcalibur wheel
        id: released-wheel
        uses: ./.github/actions/resolve-vexcalibur-wheel
        with:
          artifact-name: ${{ env.VEXCALIBUR_RELEASE_PACKAGE_ARTIFACT }}-python-${{ matrix.python-version }}

      - name: Run latest released package help
        uses: ./
        with:
          package-spec: ${{ steps.released-wheel.outputs.wheel-path }}
          allow-development-package-spec: "true"
          python-version: ${{ matrix.python-version }}
          args: --help

  released-package-query-osv:
    name: Released package E2E query-osv (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: [quality, resolve-released-package, verify-released-package-artifact]
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(needs.resolve-released-package.outputs.python-versions) }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Resolve verified Vexcalibur wheel
        id: released-wheel
        uses: ./.github/actions/resolve-vexcalibur-wheel
        with:
          artifact-name: ${{ env.VEXCALIBUR_RELEASE_PACKAGE_ARTIFACT }}-python-${{ matrix.python-version }}

      - name: Run latest released package query-osv
        uses: ./.github/actions/query-osv-e2e
        with:
          package-spec: ${{ steps.released-wheel.outputs.wheel-path }}
          allow-development-package-spec: "true"
          python-version: ${{ matrix.python-version }}

  released-package-openvex:
    name: Released package E2E OpenVEX (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: [quality, resolve-released-package, verify-released-package-artifact]
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(needs.resolve-released-package.outputs.python-versions) }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Resolve verified Vexcalibur wheel
        id: released-wheel
        uses: ./.github/actions/resolve-vexcalibur-wheel
        with:
          artifact-name: ${{ env.VEXCALIBUR_RELEASE_PACKAGE_ARTIFACT }}-python-${{ matrix.python-version }}

      - name: Generate and validate OpenVEX
        uses: ./.github/actions/openvex-e2e
        with:
          package-spec: ${{ steps.released-wheel.outputs.wheel-path }}
          allow-development-package-spec: "true"
          python-version: ${{ matrix.python-version }}
          artifact-name: ${{ env.VEXCALIBUR_OPENVEX_RELEASE_ARTIFACT }}-python-${{ matrix.python-version }}

  released-package-csaf:
    name: Released package E2E CSAF (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: [quality, resolve-released-package, verify-released-package-artifact]
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(needs.resolve-released-package.outputs.python-versions) }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Resolve verified Vexcalibur wheel
        id: released-wheel
        uses: ./.github/actions/resolve-vexcalibur-wheel
        with:
          artifact-name: ${{ env.VEXCALIBUR_RELEASE_PACKAGE_ARTIFACT }}-python-${{ matrix.python-version }}

      - name: Generate and validate CSAF
        uses: ./.github/actions/csaf-e2e
        with:
          package-spec: ${{ steps.released-wheel.outputs.wheel-path }}
          allow-development-package-spec: "true"
          python-version: ${{ matrix.python-version }}
          expected-generator-version: ${{ needs.resolve-released-package.outputs.version }}
          artifact-name: ${{ env.VEXCALIBUR_CSAF_RELEASE_ARTIFACT }}-python-${{ matrix.python-version }}

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          comment-summary-in-pr: never
          fail-on-severity: high

  scorecard:
    name: OpenSSF Scorecard
    runs-on: ubuntu-latest
    permissions:
      actions: read
      checks: read
      contents: read
      issues: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        uses: ./.github/actions/run-scorecard

  ci:
    name: CI result
    runs-on: ubuntu-latest
    needs:
      - quality
      - wrapper-fuzz-smoke
      - build-vexcalibur-wheel
      - e2e-wheel-help
      - e2e-wheel-query-osv
      - sbom-to-vex-e2e
      - openvex-wheel-e2e
      - csaf-wheel-e2e
      - resolve-released-package
      - verify-released-package-artifact
      - released-package-help
      - released-package-query-osv
      - released-package-openvex
      - released-package-csaf
      - dependency-review
      - scorecard
    if: always()
    steps:
      - name: Check required jobs
        run: |
          check_required_job() {
            local name="$1"
            local result="$2"
            if [[ "$result" != "success" ]]; then
              echo "Required job failed or was skipped: $name ($result)" >&2
              exit 1
            fi
          }

          check_release_job() {
            local name="$1"
            local result="$2"
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "Released-package job failed: $name ($result)" >&2
              exit 1
            fi
          }

          check_required_job "Quality" "${{ needs.quality.result }}"
          check_required_job "Wrapper fuzz smoke" "${{ needs.wrapper-fuzz-smoke.result }}"
          check_required_job "Build Vexcalibur wheel" "${{ needs.build-vexcalibur-wheel.result }}"
          check_required_job "Action E2E help" "${{ needs.e2e-wheel-help.result }}"
          check_required_job "Action E2E query-osv" "${{ needs.e2e-wheel-query-osv.result }}"
          check_required_job "SBOM-to-VEX action E2E" "${{ needs.sbom-to-vex-e2e.result }}"
          check_required_job "OpenVEX action E2E (development wheel)" "${{ needs.openvex-wheel-e2e.result }}"
          check_required_job "CSAF action E2E (development wheel)" "${{ needs.csaf-wheel-e2e.result }}"
          check_required_job "Resolve tested package" "${{ needs.resolve-released-package.result }}"
          check_required_job "Verify released package artifact" "${{ needs.verify-released-package-artifact.result }}"
          check_required_job "OpenSSF Scorecard" "${{ needs.scorecard.result }}"

          check_required_job "Released package E2E help" "${{ needs.released-package-help.result }}"
          check_required_job "Released package E2E query-osv" "${{ needs.released-package-query-osv.result }}"
          check_required_job "Released package E2E OpenVEX" "${{ needs.released-package-openvex.result }}"
          check_required_job "Released package E2E CSAF" "${{ needs.released-package-csaf.result }}"

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            check_required_job "Dependency Review" "${{ needs.dependency-review.result }}"
          else
            check_release_job "Dependency Review" "${{ needs.dependency-review.result }}"
          fi

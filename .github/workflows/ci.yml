name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Install development dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Validate shell
        run: bash -n scripts/run-vexcalibur.sh

      - name: Validate YAML and JSON
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import yaml

          for path in sorted(Path(".").glob("**/*.yml")):
              with path.open() as stream:
                  yaml.safe_load(stream)
              print(f"YAML OK {path}")

          for path in sorted(Path(".").glob("**/*.yaml")):
              with path.open() as stream:
                  yaml.safe_load(stream)
              print(f"YAML OK {path}")

          for path in sorted(Path(".").glob("**/*.json")):
              with path.open() as stream:
                  json.load(stream)
              print(f"JSON OK {path}")
          PY

      - name: Run unit tests
        run: python -m unittest discover -s tests

  smoke:
    name: Action smoke test
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run local action
        uses: ./
        with:
          package-spec: git+https://github.com/vexcalibur-dev/vexcalibur.git@cc9506fc451bed1a5658a53cee4eaf7174505514
          allow-development-package-spec: "true"
          args: --help

      - name: Run local action query-osv path
        uses: ./
        with:
          package-spec: ${{ github.workspace }}/tests/fixtures/fake-vexcalibur
          allow-development-package-spec: "true"
          args: |
            query-osv
            --allow-public-osv
            --
            pkg:pypi/django@1.2

            pkg:npm/minimist@0.0.8

      - name: Validate query-osv smoke arguments
        run: |
          cat > "$RUNNER_TEMP/expected-vexcalibur-query-args.txt" <<'EOF'
          query-osv
          --allow-public-osv
          --
          pkg:pypi/django@1.2
          pkg:npm/minimist@0.0.8
          EOF
          diff -u "$RUNNER_TEMP/expected-vexcalibur-query-args.txt" "$RUNNER_TEMP/vexcalibur-query-args.txt"

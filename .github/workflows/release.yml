name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: Optional explicit MAJOR.MINOR.PATCH version. Empty computes the next version.
        required: false
        type: string

concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

jobs:
  resolve:
    name: Resolve release candidate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.release.outputs.skip }}
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      previous_tag: ${{ steps.release.outputs.previous_tag }}
      bump: ${{ steps.release.outputs.bump }}
      sha: ${{ steps.sha.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Require current main tip
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          current_main_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" --jq '.object.sha')"
          if [[ "${current_main_sha}" != "${GITHUB_SHA}" ]]; then
            echo "Refusing to release from a stale main workflow run." >&2
            echo "Current main: ${current_main_sha}" >&2
            echo "Workflow SHA: ${GITHUB_SHA}" >&2
            exit 1
          fi

      - name: Determine release version
        id: release
        env:
          MANUAL_VERSION: ${{ github.event.inputs.version || '' }}
        run: scripts/next-release-tag.sh "${MANUAL_VERSION}"

      - name: Record release SHA
        id: sha
        run: printf 'sha=%s\n' "${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Stop on skipped release
        if: steps.release.outputs.skip == 'true'
        run: echo "Release skipped by commit messages."

  wait-for-ci:
    name: Wait for CI
    runs-on: ubuntu-latest
    needs: resolve
    if: needs.resolve.outputs.skip != 'true'
    permissions:
      actions: read
      contents: read
    steps:
      - name: Wait for current SHA CI
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ needs.resolve.outputs.sha }}
        run: |
          set -euo pipefail

          for _ in {1..90}; do
            run_json="$(
              gh run list \
                --repo "${GITHUB_REPOSITORY}" \
                --workflow ci.yml \
                --branch main \
                --commit "${RELEASE_SHA}" \
                --json conclusion,databaseId,status,url \
                --limit 1
            )"
            if [[ "${run_json}" == "[]" ]]; then
              echo "Waiting for CI run for ${RELEASE_SHA}."
              sleep 10
              continue
            fi

            status="$(python -c 'import json,sys; print(json.load(sys.stdin)[0]["status"])' <<< "${run_json}")"
            conclusion="$(python -c 'import json,sys; print(json.load(sys.stdin)[0]["conclusion"] or "")' <<< "${run_json}")"
            url="$(python -c 'import json,sys; print(json.load(sys.stdin)[0]["url"])' <<< "${run_json}")"
            echo "CI run: ${url} (${status}/${conclusion:-pending})"

            if [[ "${status}" != "completed" ]]; then
              sleep 10
              continue
            fi
            if [[ "${conclusion}" == "success" ]]; then
              exit 0
            fi
            echo "CI did not pass for ${RELEASE_SHA}: ${conclusion}" >&2
            exit 1
          done

          echo "Timed out waiting for CI to pass for ${RELEASE_SHA}." >&2
          exit 1

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - resolve
      - wait-for-ci
    if: needs.resolve.outputs.skip != 'true'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ needs.resolve.outputs.sha }}

      - name: Require current main tip
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ needs.resolve.outputs.sha }}
        run: |
          set -euo pipefail

          current_main_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" --jq '.object.sha')"
          if [[ "${current_main_sha}" != "${RELEASE_SHA}" ]]; then
            echo "Refusing to publish a stale release." >&2
            echo "Current main: ${current_main_sha}" >&2
            echo "Release SHA: ${RELEASE_SHA}" >&2
            exit 1
          fi

      - name: Verify compatibility table
        env:
          RELEASE_TAG: ${{ needs.resolve.outputs.tag }}
          RELEASE_VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          set -euo pipefail

          python - <<'PY'
          from pathlib import Path
          import os
          import re

          release_tag = os.environ["RELEASE_TAG"]
          release_version = os.environ["RELEASE_VERSION"]
          if release_tag != f"v{release_version}":
              raise SystemExit(f"release tag {release_tag!r} does not match version {release_version!r}")

          ci_text = Path(".github/workflows/ci.yml").read_text(encoding="utf-8")
          version_match = re.search(
              r'^\s*VEXCALIBUR_RELEASE_PACKAGE_VERSION:\s*"([^"]+)"\s*$',
              ci_text,
              re.MULTILINE,
          )
          if version_match is None:
              raise SystemExit("could not find VEXCALIBUR_RELEASE_PACKAGE_VERSION in ci.yml")

          package_spec = f"vexcalibur=={version_match.group(1)}"
          compatibility_text = Path("docs/reference/compatibility.md").read_text(encoding="utf-8")
          row_pattern = re.compile(
              rf"^\|\s*`{re.escape(release_tag)}`\s*\|\s*`{re.escape(package_spec)}`\s*\|",
              re.MULTILINE,
          )
          if row_pattern.search(compatibility_text) is None:
              raise SystemExit(
                  "docs/reference/compatibility.md must include a row for "
                  f"{release_tag} with `{package_spec}` before publishing"
              )

          print(f"Compatibility table includes {release_tag} with {package_spec}.")
          PY

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"

      - name: Install release note scanner
        run: python -m pip install -r requirements-dev.txt

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.AUTOMATION_CLIENT_ID }}
          private-key: ${{ secrets.AUTOMATION_SECRET }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write

      - name: Generate release notes
        env:
          RELEASE_TAG: ${{ needs.resolve.outputs.tag }}
          PREVIOUS_TAG: ${{ needs.resolve.outputs.previous_tag }}
          RELEASE_SHA: ${{ needs.resolve.outputs.sha }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail

          args=(
            "repos/${GITHUB_REPOSITORY}/releases/generate-notes"
            -f "tag_name=${RELEASE_TAG}"
            -f "target_commitish=${RELEASE_SHA}"
          )
          if [[ -n "${PREVIOUS_TAG}" ]]; then
            args+=(-f "previous_tag_name=${PREVIOUS_TAG}")
          fi

          gh api "${args[@]}" --jq .body > /tmp/vexcalibur-action-release-notes.md

      - name: Scan release notes
        run: |
          set -euo pipefail

          detect-secrets-hook \
            --baseline .secrets.baseline \
            -- /tmp/vexcalibur-action-release-notes.md

      - name: Create release tag
        env:
          RELEASE_TAG: ${{ needs.resolve.outputs.tag }}
          RELEASE_SHA: ${{ needs.resolve.outputs.sha }}
          RELEASE_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail

          bot_user_id="$(gh api "/users/${APP_SLUG}%5Bbot%5D" --jq .id)"
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${bot_user_id}+${APP_SLUG}[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${RELEASE_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if git rev-parse -q --verify "refs/tags/${RELEASE_TAG}" >/dev/null; then
            tag_sha="$(git rev-parse --verify "refs/tags/${RELEASE_TAG}^{commit}")"
            if [[ "${tag_sha}" != "${RELEASE_SHA}" ]]; then
              echo "Release tag ${RELEASE_TAG} already exists on ${tag_sha}, not ${RELEASE_SHA}." >&2
              exit 1
            fi
            echo "Release tag ${RELEASE_TAG} already points at ${RELEASE_SHA}."
          else
            git tag -a "${RELEASE_TAG}" -m "Release ${RELEASE_TAG}" "${RELEASE_SHA}"
            git push origin "${RELEASE_TAG}"
          fi

      - name: Create GitHub Release
        env:
          RELEASE_TAG: ${{ needs.resolve.outputs.tag }}
          RELEASE_SHA: ${{ needs.resolve.outputs.sha }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail

          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "GitHub Release ${RELEASE_TAG} already exists."
            exit 0
          fi

          args=(
            release create "${RELEASE_TAG}"
            --repo "${GITHUB_REPOSITORY}"
            --verify-tag
            --target "${RELEASE_SHA}"
            --title "${RELEASE_TAG}"
            --notes-file /tmp/vexcalibur-action-release-notes.md
          )

          gh "${args[@]}"

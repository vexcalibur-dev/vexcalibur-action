name: Vexcalibur
description: Run Vexcalibur in GitHub Actions workflows.

inputs:
  package-spec:
    description: Exact Vexcalibur package spec passed to pip install.
    required: true
  allow-development-package-spec:
    description: Allow non-release package specs such as Git URLs. Use only for development workflows.
    required: false
    default: "false"
  constraints-file:
    description: >-
      Absolute path to a pip constraints file applied to the isolated install.
      Use this to pin transitive dependency versions for reproducible,
      supply-chain-hardened installs.
    required: false
    default: ""
  python-version:
    description: Python version used to install and run Vexcalibur.
    required: false
    default: "3.14"
  args:
    description: Newline-separated arguments passed to the installed vexcalibur executable.
    required: false
    default: "--help"

runs:
  using: composite
  steps:
    - name: Set up Python
      id: setup-python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: ${{ inputs.python-version }}

    - name: Run Vexcalibur
      shell: /bin/bash --noprofile --norc -e -o pipefail {0}
      working-directory: ${{ runner.temp }}
      env:
        BASH_ENV: ""
        VEXCALIBUR_PYTHON: ${{ steps.setup-python.outputs.python-path }}
        VEXCALIBUR_PACKAGE_SPEC: ${{ inputs.package-spec }}
        VEXCALIBUR_ALLOW_DEVELOPMENT_PACKAGE_SPEC: ${{ inputs.allow-development-package-spec }}
        VEXCALIBUR_CONSTRAINTS_FILE: ${{ inputs.constraints-file }}
        VEXCALIBUR_ARGS: ${{ inputs.args }}
      run: '"$GITHUB_ACTION_PATH/scripts/run-vexcalibur.sh"'

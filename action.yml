---
name: Vexcalibur
description: >-
  Install a selected Vexcalibur package and run its CLI in a GitHub Actions
  workflow.

inputs:
  package-spec:
    description: >-
      Vexcalibur package requirement passed to pip install. An exact release is
      required by default.
    required: true
  allow-development-package-spec:
    description: >-
      Set to true to permit a Git URL, local path, or another non-release
      package spec.
    required: false
    default: "false"
  constraints-file:
    description: >-
      Absolute path to a readable pip constraints file. Pip applies it while
      installing Vexcalibur in the private virtual environment.
    required: false
    default: ""
  python-version:
    description: Python version request passed to actions/setup-python.
    required: false
    default: "3.14"
  args:
    description: >-
      Newline-separated CLI arguments. Each nonblank line becomes one argument.
    required: false
    default: "--help"

runs:
  using: composite
  steps:
    - name: Set up Python
      id: setup-python
      # actions/setup-python v6.3.0
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
      with:
        python-version: ${{ inputs.python-version }}

    - name: Run Vexcalibur
      shell: /bin/bash --noprofile --norc -e -o pipefail {0}
      working-directory: ${{ runner.temp }}
      env:
        BASH_ENV: ""
        VEXCALIBUR_PYTHON: ${{ steps.setup-python.outputs.python-path }}
        VEXCALIBUR_PACKAGE_SPEC: ${{ inputs.package-spec }}
        VEXCALIBUR_ALLOW_DEVELOPMENT_PACKAGE_SPEC: >-
          ${{ inputs.allow-development-package-spec }}
        VEXCALIBUR_CONSTRAINTS_FILE: ${{ inputs.constraints-file }}
        VEXCALIBUR_ARGS: ${{ inputs.args }}
      run: '"$GITHUB_ACTION_PATH/scripts/run-vexcalibur.sh"'

name: Vexcalibur
description: Install a selected Vexcalibur package and run its CLI in a GitHub Actions workflow.

inputs:
  package-spec:
    description: Vexcalibur package requirement passed to pip install. An exact release is required by default.
    required: true
  allow-development-package-spec:
    description: Set to true to permit a Git URL, local path, or another non-release package spec.
    required: false
    default: "false"
  constraints-file:
    description: >-
      Absolute path to a readable pip constraints file. Pip applies it while
      installing Vexcalibur in the private virtual environment.
    required: false
    default: ""
  python-version:
    description: Python version request passed to actions/setup-python.
    required: false
    default: "3.14"
  args:
    description: Newline-separated CLI arguments. Each nonblank line becomes one argument.
    required: false
    default: "--help"

runs:
  using: composite
  steps:
    - name: Set up Python
      id: setup-python
      uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
      with:
        python-version: ${{ inputs.python-version }}

    - name: Run Vexcalibur
      shell: /bin/bash --noprofile --norc -e -o pipefail {0}
      working-directory: ${{ runner.temp }}
      env:
        BASH_ENV: ""
        VEXCALIBUR_PYTHON: ${{ steps.setup-python.outputs.python-path }}
        VEXCALIBUR_PACKAGE_SPEC: ${{ inputs.package-spec }}
        VEXCALIBUR_ALLOW_DEVELOPMENT_PACKAGE_SPEC: ${{ inputs.allow-development-package-spec }}
        VEXCALIBUR_CONSTRAINTS_FILE: ${{ inputs.constraints-file }}
        VEXCALIBUR_ARGS: ${{ inputs.args }}
      run: '"$GITHUB_ACTION_PATH/scripts/run-vexcalibur.sh"'
